apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-flow-ide-canary
  namespace: local-flow-ide
  labels:
    app: local-flow-ide
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: local-flow-ide
      track: canary
  template:
    metadata:
      labels:
        app: local-flow-ide
        track: canary
    spec:
      containers:
      - name: god-ide
        image: godlevelide/core:canary
        ports:
        - containerPort: 1420
        env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-key
              key: api-key
